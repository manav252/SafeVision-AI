services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-safevision}
      POSTGRES_USER: ${POSTGRES_USER:-safevision}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-safevision_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-safevision}:${POSTGRES_PASSWORD:-safevision_dev_password}@postgres:5432/${POSTGRES_DB:-safevision}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?Set JWT_SECRET_KEY in .env before starting docker compose}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8501}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    environment:
      SAFEVISION_API_URL: http://api:8000
      SAFEVISION_BACKEND_SYNC: ${SAFEVISION_BACKEND_SYNC:-true}
      SAFEVISION_API_EMAIL: ${SAFEVISION_API_EMAIL:-streamlit@safevision.ai}
      SAFEVISION_API_PASSWORD: ${SAFEVISION_API_PASSWORD:-replace-this-streamlit-sync-password}
    ports:
      - "8501:8501"
    volumes:
      - ./outputs:/app/outputs
      - ./models:/app/models
    depends_on:
      - api

volumes:
  postgres_data:
