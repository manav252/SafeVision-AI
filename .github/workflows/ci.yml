name: SafeVision AI CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: pip install -r requirements-dev.txt

      - name: Backend import check
        env:
          JWT_SECRET_KEY: ci-secret-key-for-safevision-ai-32-chars
          DATABASE_URL: sqlite:///./ci_safevision.db
        run: python -c "from backend.app.main import app; print(app.title)"

      - name: Run Python tests
        env:
          JWT_SECRET_KEY: ci-secret-key-for-safevision-ai-32-chars
          DATABASE_URL: sqlite:///./ci_safevision.db
        run: pytest

  web-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build web demo
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build FastAPI image
        run: docker build -f Dockerfile .

      - name: Build Streamlit image
        run: docker build -f Dockerfile.streamlit .
